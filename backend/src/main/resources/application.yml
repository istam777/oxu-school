server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: osiyo-school-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/osiyo_school}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  jwt:
    secret: ${APP_JWT_SECRET:N2Q2N2Q5YzQ4YjZiN2M5YTQzZDM2NmU4MTM2NmU4ZmEyZmZmZmUxYmI2ZGRjNzRjM2Y4YjA4MmI2MWY4OA==}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  upload-dir: ${APP_UPLOAD_DIR:uploads}

logging:
  level:
    org.springframework.security: INFO
